name: daatlas
options:
  bundleIdPrefix: com.daatlas
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: "MGSYAXCXK3"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGNING_REQUIRED: "YES"
    CODE_SIGNING_ALLOWED: "YES"
    CODE_SIGN_STYLE: "Automatic"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.19"

targets:
  daatlas:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources/Assets.xcassets
    dependencies:
      - package: ZIPFoundation
      - target: GlucoseWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daatlas.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/daatlas.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        INFOPLIST_KEY_NSSupportsLiveActivitiesFrequentUpdates: YES
    entitlements:
      path: Resources/daatlas.entitlements
      properties:
        com.apple.developer.healthkit: true

  GlucoseWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: GlucoseWidget
      - path: Sources/Shared
    info:
      path: GlucoseWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        CFBundleDisplayName: GlucoseWidget
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daatlas.app.GlucoseWidget
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: "MGSYAXCXK3"
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGN_STYLE: "Automatic"
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: "YES"

schemes:
  daatlas:
    build:
      targets:
        daatlas: all
        GlucoseWidget: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
